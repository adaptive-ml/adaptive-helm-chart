{{- if not .Values.clickhouse.enabled }}
  {{- /* ClickHouse disabled: skip entirely */ -}}
{{- else if .Values.secrets.existingClickHouseSecret }}
  {{- /* When using existingClickHouseSecret, we don't create a secret, so no validation needed */ -}}
  {{- if or .Values.clickhouse.auth.password .Values.clickhouse.s3.accessKeyId .Values.clickhouse.s3.secretAccessKey }}
    {{- fail "Error: 'secrets.existingClickHouseSecret' is set, but inline ClickHouse values (clickhouse.auth.password, clickhouse.s3.accessKeyId, or clickhouse.s3.secretAccessKey) are also provided. These options cannot be combined. Please remove the inline values or unset 'existingClickHouseSecret'." }}
  {{- end }}
{{- else }}
  {{- /* Validation: ensure mutual exclusivity between internal and external ClickHouse */ -}}
  {{- if not .Values.clickhouse.install.enabled }}
    {{- if not .Values.clickhouse.external.url }}
      {{- fail "Error: clickhouse.install.enabled is false, but clickhouse.external.url is not provided. Please provide clickhouse.external.url to use external ClickHouse, or set clickhouse.install.enabled to true to use internal ClickHouse." }}
    {{- end }}
  {{- else }}
    {{- if .Values.clickhouse.external.url }}
      {{- fail "Error: clickhouse.install.enabled is true, but clickhouse.external.url is also provided. These options are mutually exclusive. Please set clickhouse.install.enabled to false to use external ClickHouse, or remove clickhouse.external.url to use internal ClickHouse." }}
    {{- end }}
  {{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "adaptive.clickhouse.secret.fullname" . }}
type: Opaque
data:
  clickhouseUrl: {{ include "adaptive.clickhouse.url" . | b64enc }}
  clickhouseUsername: {{ .Values.clickhouse.auth.username | b64enc }}
  clickhousePassword: {{ .Values.clickhouse.auth.password | default "" | b64enc }}
  clickhouseDatabase: {{ .Values.clickhouse.database | b64enc }}
  {{- if .Values.clickhouse.install.enabled }}
  clickhouseS3Endpoint: {{ required "clickhouse.s3.endpoint is required when clickhouse.install.enabled is true" .Values.clickhouse.s3.endpoint | b64enc }}
  clickhouseS3AccessKeyId: {{ .Values.clickhouse.s3.accessKeyId | default "" | b64enc }}
  clickhouseS3SecretAccessKey: {{ .Values.clickhouse.s3.secretAccessKey | default "" | b64enc }}
  {{- end }}
{{- end }}
