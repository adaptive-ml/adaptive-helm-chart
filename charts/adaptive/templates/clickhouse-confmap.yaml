{{- if and .Values.clickhouse.enabled .Values.clickhouse.install.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "adaptive.clickhouse.configMap.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "adaptive.labels" . | nindent 4 }}
    {{- include "adaptive.clickhouse.selectorLabels" . | nindent 4 }}
data:
  storage.xml: |
    <clickhouse>
        <storage_configuration>
            <disks>
                <s3>
                    <type>s3</type>
                    <endpoint from_env="CLICKHOUSE_S3_ENDPOINT" />
                    <access_key_id from_env="CLICKHOUSE_S3_ACCESS_KEY_ID" />
                    <secret_access_key from_env="CLICKHOUSE_S3_SECRET_ACCESS_KEY" />
                </s3>
            </disks>
            <policies>
                <s3_main>
                    <volumes>
                        <main>
                            <disk>s3</disk>
                        </main>
                    </volumes>
                </s3_main>
            </policies>
        </storage_configuration>
        <merge_tree>
            <storage_policy>s3_main</storage_policy>
        </merge_tree>
    </clickhouse>
{{- end }}
