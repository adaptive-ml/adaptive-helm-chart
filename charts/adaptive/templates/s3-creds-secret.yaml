{{- if .Values.secrets.existingS3CredsSecret }}
  {{- if or (gt (len .Values.secrets.s3Creds) 0) .Values.minio.enabled }}
    {{- fail "Error: 'secrets.existingS3CredsSecret' is set, but inline s3Creds values or minio.enabled are also provided. These options cannot be combined; remove the inline values and disable minio, or unset 'existingS3CredsSecret'." }}
  {{- end }}
{{- else if include "adaptive.s3Creds.enabled" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "adaptive.s3Creds.secret.fullname" . }}
  labels:
    {{- include "adaptive.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- /* Start with minio defaults when enabled, then let user values override */ -}}
  {{- if .Values.minio.enabled }}
  {{- $minioDefaults := dict
    "AWS_ACCESS_KEY_ID" (.Values.minio.auth.rootUser | default "adaptive")
    "AWS_SECRET_ACCESS_KEY" (required "minio.auth.rootPassword is required when minio.enabled is true" .Values.minio.auth.rootPassword)
    "AWS_DEFAULT_REGION" "us-east-1"
    "AWS_ENDPOINT_URL_S3" (include "adaptive.minio.endpoint" .)
    "S3_FORCE_PATH_STYLE" "true"
  }}
  {{- $merged := merge $minioDefaults .Values.secrets.s3Creds }}
  {{- range $key, $value := $merged }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- /* s3proxy: use fixed auth values, then let user values override */ -}}
  {{- else if .Values.s3proxy.enabled }}
  {{- $s3proxyDefaults := dict
    "AWS_ACCESS_KEY_ID" "adaptive-s3proxy"
    "AWS_SECRET_ACCESS_KEY" "adaptive-s3proxy-credential"
    "AWS_DEFAULT_REGION" "us-east-1"
    "AWS_ENDPOINT_URL_S3" (include "adaptive.s3proxy.endpoint" .)
    "S3_FORCE_PATH_STYLE" "true"
  }}
  {{- $merged := merge $s3proxyDefaults .Values.secrets.s3Creds }}
  {{- range $key, $value := $merged }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- /* No minio or s3proxy: use plain s3Creds values */ -}}
  {{- else }}
  {{- range $key, $value := .Values.secrets.s3Creds }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
