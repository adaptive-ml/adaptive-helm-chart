{{- /*
DEPRECATED: This ConfigMap is no longer read by the k8s-operator.
Harmony pod resources (CPU_REQUESTS, MEMORY_REQUESTS_MB, CPU_LIMITS, MEMORY_LIMITS_MB)
are now inlined directly in the harmony-gang-config ConfigMap.

This file is retained for backward compatibility during the deprecation period.
It will be removed in a future release.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: harmony-mangrove-resources
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "adaptive.labels" . | nindent 4 }}
  annotations:
    deprecated: "true"
    deprecated-message: "Resources are now inlined in harmony-gang-config. This ConfigMap will be removed in a future release."
data:
  CPU_REQUESTS: {{ .Values.adaptiveOperator.resources.requests.cpu | quote }}
  MEMORY_REQUESTS_MB: {{ .Values.adaptiveOperator.resources.requests.memoryMB | quote }}
  CPU_LIMITS: {{ .Values.adaptiveOperator.resources.limits.cpu | quote }}
  MEMORY_LIMITS_MB: {{ .Values.adaptiveOperator.resources.limits.memoryMB | quote }}
