{{- if .Values.s3proxy.enabled }}
{{- if .Values.secrets.existingS3ProxySecret }}
  {{- if or .Values.s3proxy.azure.storageAccountName .Values.s3proxy.azure.storageAccountKey }}
    {{- fail "Error: 'secrets.existingS3ProxySecret' is set, but inline Azure credentials (s3proxy.azure.storageAccountName or s3proxy.azure.storageAccountKey) are also provided. These options cannot be combined; remove the inline values or unset 'existingS3ProxySecret'." }}
  {{- end }}
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "adaptive.s3proxy.secret.fullname" . }}
  labels:
    {{- include "adaptive.labels" . | nindent 4 }}
    {{- include "adaptive.s3proxy.selectorLabels" . | nindent 4 }}
type: Opaque
stringData:
  JCLOUDS_PROVIDER: "azureblob-sdk"
  JCLOUDS_IDENTITY: {{ required "s3proxy.azure.storageAccountName is required when s3proxy.enabled is true and existingS3ProxySecret is not set" .Values.s3proxy.azure.storageAccountName | quote }}
  JCLOUDS_CREDENTIAL: {{ required "s3proxy.azure.storageAccountKey is required when s3proxy.enabled is true and existingS3ProxySecret is not set" .Values.s3proxy.azure.storageAccountKey | quote }}
  JCLOUDS_ENDPOINT: {{ include "adaptive.s3proxy.azureEndpoint" . | quote }}
{{- end }}
{{- end }}
